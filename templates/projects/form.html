{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}{% if object %}Редагування{% else %}Новий проєкт{% endif %}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow-sm">
            <div class="card-body">
                <h3 class="card-title mb-4">
                    {% if object %}
                        <i class="bi bi-pencil-square"></i> Редагування проєкту
                    {% else %}
                        <i class="bi bi-folder-plus"></i> Новий проєкт
                    {% endif %}
                </h3>
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Зберегти</button>
                        <a href="{% if object %}{% url 'projects:detail' object.pk %}{% else %}{% url 'projects:list' %}{% endif %}" class="btn btn-outline-secondary">Скасувати</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
