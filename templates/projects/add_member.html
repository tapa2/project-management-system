{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Додати учасника — {{ project.name }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body">
                <h4 class="card-title mb-4"><i class="bi bi-person-plus"></i> Додати учасника до «{{ project.name }}»</h4>
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Додати</button>
                        <a href="{% url 'projects:detail' project.pk %}" class="btn btn-outline-secondary">Скасувати</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
