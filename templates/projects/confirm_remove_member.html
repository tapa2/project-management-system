{% extends 'base.html' %}

{% block title %}Видалити учасника{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-warning shadow-sm">
            <div class="card-body">
                <h4 class="text-warning"><i class="bi bi-person-dash"></i> Видалити учасника?</h4>
                <p class="mb-4">
                    Видалити <strong>{{ object.user }}</strong> з проєкту <strong>{{ object.project.name }}</strong>?
                </p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-warning">Так, видалити</button>
                    <a href="{% url 'projects:detail' object.project.pk %}" class="btn btn-outline-secondary">Скасувати</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
