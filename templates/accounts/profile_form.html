{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Редагування профілю{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow-sm">
            <div class="card-body">
                <h3 class="card-title mb-4"><i class="bi bi-pencil-square"></i> Редагування профілю</h3>
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Зберегти</button>
                        <a href="{% url 'accounts:profile' %}" class="btn btn-outline-secondary">Скасувати</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
