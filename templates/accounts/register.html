{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Реєстрація — PM System{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body">
                <h3 class="card-title mb-4 text-center"><i class="bi bi-person-plus"></i> Реєстрація</h3>
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-success w-100">Створити акаунт</button>
                </form>
                <hr>
                <p class="text-center mb-0">
                    Вже зареєстровані?
                    <a href="{% url 'accounts:login' %}">Увійти</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
