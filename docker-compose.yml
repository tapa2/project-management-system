# =============================================================================
# docker-compose.yml — Система управління проєктами
#   Сервіси: db (Postgres) · redis · web (Django + Gunicorn) · celery · nginx
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pms_db}
      POSTGRES_USER: ${POSTGRES_USER:-pms_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pms_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pms_user} -d ${POSTGRES_DB:-pms_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    expose:
      - "5432"

  # ---------------------------------------------------------------------------
  # Redis — broker та result-backend для Celery
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    expose:
      - "6379"

  # ---------------------------------------------------------------------------
  # Django + Gunicorn
  # ---------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: pms-web:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      RUN_MIGRATIONS: "1"
      RUN_COLLECTSTATIC: "1"
      # Перекриваємо URL-и зі стандартного .env, щоб ходити на сервіси compose
      DATABASE_URL: postgres://${POSTGRES_USER:-pms_user}:${POSTGRES_PASSWORD:-pms_password}@db:5432/${POSTGRES_DB:-pms_db}
      REDIS_URL: redis://redis:6379/0
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS_DOCKER:-localhost,127.0.0.1,nginx,web}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"

  # ---------------------------------------------------------------------------
  # Celery worker
  # ---------------------------------------------------------------------------
  celery:
    build:
      context: .
      dockerfile: Dockerfile
    image: pms-web:latest
    restart: unless-stopped
    command: ["celery", "-A", "config", "worker", "-l", "info"]
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      RUN_MIGRATIONS: "0"
      RUN_COLLECTSTATIC: "0"
      DATABASE_URL: postgres://${POSTGRES_USER:-pms_user}:${POSTGRES_PASSWORD:-pms_password}@db:5432/${POSTGRES_DB:-pms_db}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started

  # ---------------------------------------------------------------------------
  # Nginx — reverse proxy + static/media
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
  media_volume:
